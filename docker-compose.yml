services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prami
      POSTGRES_PASSWORD: prami
      POSTGRES_DB: prami
    volumes:
      - prami_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prami"]
      interval: 5s
      timeout: 5s
      retries: 5

  prami:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  prami_pgdata:
